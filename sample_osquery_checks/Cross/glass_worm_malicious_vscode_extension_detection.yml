title: GlassWorm Malicious VSCode Extension Detection
id: 7da50c1cd65945fe9784c1a435e37264
description: |
  Detects the presence of malicious or suspicious Open VSX extensions linked to the GlassWorm supply chain attack campaign. GlassWorm employs a sophisticated sleeper extension strategy where threat actors publish benign-looking clones of popular VSCode extensions to Open VSX marketplace, then later activate them through updates to deliver malware. These extensions are published by newly created GitHub accounts with minimal repository activity (typically one empty repository with an eight-character name). At least six extensions have been confirmed to deliver active malware, while 67 additional extensions are tracked as high-confidence sleepers awaiting activation. The malware uses multiple delivery mechanisms including native binaries (.node files), obfuscated JavaScript payloads, and transitive delivery via extensionPack dependencies. Upon activation, these extensions download VSIX payloads from GitHub releases and install them across multiple IDEs (VS Code, Cursor, Windsurf, VSCodium) using automated installation commands. The extensions closely impersonate legitimate tools using copied icons, descriptions, and naming patterns to appear trustworthy. Detection focuses on identifying known malicious extension identifiers, suspicious publisher patterns, and the presence of characteristic installation artifacts. Organizations using Open VSX or allowing extension installations from non-official marketplaces should monitor for these indicators and restrict extension installations to verified publishers.
references:
  - https://socket.dev/blog/73-open-vsx-sleeper-extensions-glassworm
author:
  - rafa.bono@okta.com
platform:
  - macOS
  - Windows
  - Linux
query: |
  SELECT 
    CASE 
      WHEN count(*) = 0 THEN '0'
      ELSE '1'
    END AS glassworm_vsx_extension 
  FROM vscode_extensions
  WHERE name IN (
      'outsidestormcommand.monochromator-theme', --malicious
      'keyacrosslaud.auto-loop-for-antigravity', --malicious
      'krundoven.ironplc-fast-hub', --malicious
