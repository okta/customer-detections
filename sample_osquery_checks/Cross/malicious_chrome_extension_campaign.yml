title: Malicious Chrome Extension Campaign
id: b5dafc2a2f92492ba41dc8a7249018d5
description: |
  Detects malicious Chrome browser extensions linked to a coordinated campaign of 108 extensions operating under shared C2 infrastructure (cloudapi[.]stream). The campaign is controlled by a single operator using five publisher identities (Yana Project, GameGen, SideGames, Rodeo Games, InterAlt) and masquerades as legitimate tools including Telegram clients, casino games, and utility extensions. Key attack capabilities include active Telegram Web session theft with continuous exfiltration, Google account identity harvesting via OAuth2 from 54 extensions, and a universal backdoor in 45 extensions that opens arbitrary URLs on browser startup. The most severe extension (Telegram Multi-account) can perform full account takeover by replacing victim sessions. The campaign collectively accounts for approximately 20,000 Chrome Web Store installs and operates as a Malware-as-a-Service platform.
references:
  - https://socket.dev/blog/108-chrome-ext-linked-to-data-exfil-session-theft-shared-c2
author:
  - rafa.bono@okta.com
platform:
  - macOS
  - Windows
  - Linux
query: |
  SELECT 
    CASE 
      WHEN count(*) = 0 THEN '0'
      ELSE '1'
    END AS chrome_malicious_extensions
  FROM chrome_extensions
  WHERE name IN ( 
